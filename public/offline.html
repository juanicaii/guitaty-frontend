<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión - Guitaty App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .features {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .features h3 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .features ul {
            list-style: none;
            text-align: left;
        }

        .features li {
            padding: 8px 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .features li:before {
            content: "✓";
            color: #4ade80;
            font-weight: bold;
            margin-right: 10px;
        }

        .retry-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }

            .container {
                padding: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon pulse">
            💰
        </div>

        <h1>Sin conexión a internet</h1>

        <p>
            No hay conexión disponible, pero puedes seguir usando algunas funciones de Guitaty App.
        </p>

        <div class="features">
            <h3>Disponible sin conexión:</h3>
            <ul>
                <li>Ver tus datos guardados</li>
                <li>Navegar entre secciones</li>
                <li>Consultar transacciones guardadas</li>
                <li>Ver resumen de cuentas</li>
            </ul>
        </div>

        <button class="retry-btn" onclick="checkConnection()">
            Reintentar conexión
        </button>
    </div>

    <script>
        function checkConnection() {
            if (navigator.onLine) {
                window.location.reload();
            } else {
                // Show feedback that there's still no connection
                const btn = document.querySelector('.retry-btn');
                const originalText = btn.textContent;
                btn.textContent = 'Sin conexión disponible';
                btn.style.background = 'rgba(239, 68, 68, 0.3)';

                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = 'rgba(255, 255, 255, 0.2)';
                }, 2000);
            }
        }

        // Auto-retry when connection is restored
        window.addEventListener('online', () => {
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });

        // Add visual feedback for connection status
        window.addEventListener('offline', () => {
            document.body.style.filter = 'grayscale(20%)';
        });

        window.addEventListener('online', () => {
            document.body.style.filter = 'none';
        });
    </script>
</body>
</html>
